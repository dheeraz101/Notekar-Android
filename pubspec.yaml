name: notekar
description: "Native Android rewrite of the NoteKar timestamp logger."
publish_to: 'none'

version: 4.0.9+18
environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  shared_preferences: ^2.5.3
  sensors_plus: ^7.1.0
  device_info_plus: ^13.2.0
  quick_actions: ^1.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - icon-maskable-512.png
    - app_icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-Italic.ttf
          style: italic
