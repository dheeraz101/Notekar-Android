name: Build & Release APK

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# TRIGGER: Fires when code is pushed to the `release` or `beta` branch.
# Replicates scripts/build-release-apks.ps1:
#   вҶ’ 4 signed APKs (universal, arm64-v8a, armeabi-v7a, x86_64)
#   вҶ’ sha256.txt checksum file
#   вҶ’ versions/v{version}/version.json manifest
#   вҶ’ GitHub Release/Pre-release with all 4 APKs + sha256.txt attached
# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
on:
  push:
    branches:
      - release
      - beta
      - security

concurrency:
  group: release-build
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Build 4 Signed APKs & Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      # в”Җв”Җ 1. Checkout в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Checkout branch
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # в”Җв”Җ 2. Read version from pubspec.yaml в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Extract version from pubspec.yaml
        id: version
        run: |
          FULL=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' \r')
          VER=$(echo "$FULL" | cut -d'+' -f1)
          BUILD=$(echo "$FULL" | cut -d'+' -f2)
          
          if [ "${{ github.ref_name }}" = "beta" ]; then
            TAG="v${VER}-beta"
          else
            TAG="v${VER}"
          fi
          
          echo "version=$VER"       >> $GITHUB_OUTPUT
          echo "build_number=$BUILD" >> $GITHUB_OUTPUT
          echo "tag=$TAG"            >> $GITHUB_OUTPUT
          echo "рҹ“Ұ Version: $VER+$BUILD (Tag: $TAG)"

      # в”Җв”Җ 3. Environment в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Verify Flutter environment
        run: flutter doctor -v

      - name: Show pub dependencies tree
        run: flutter pub deps

      # в”Җв”Җ 4. Signing setup в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
          echo "вң… Keystore decoded"

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          EOF
          echo "вң… key.properties written"

      # в”Җв”Җ 5. Build вҖ” Universal APK в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Build universal release APK
        run: |
          flutter build apk --release \
            --build-name ${{ steps.version.outputs.version }} \
            --build-number ${{ steps.version.outputs.build_number }}
          echo "вң… Universal APK built"

      # в”Җв”Җ 6. Build вҖ” Split-per-ABI APKs (arm64, armeabi-v7a, x86_64) в”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Build split-per-ABI release APKs
        run: |
          flutter build apk --release --split-per-abi \
            --build-name ${{ steps.version.outputs.version }} \
            --build-number ${{ steps.version.outputs.build_number }}
          echo "вң… Split APKs built"

      # в”Җв”Җ 7. Rename all APKs with version + arch в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Rename APKs
        run: |
          APK_DIR=build/app/outputs/flutter-apk
          VER=${{ steps.version.outputs.version }}

          mv "$APK_DIR/app-release.apk"          "$APK_DIR/notekar-${VER}-universal.apk"
          mv "$APK_DIR/app-arm64-v8a-release.apk"    "$APK_DIR/notekar-${VER}-arm64-v8a.apk"
          mv "$APK_DIR/app-armeabi-v7a-release.apk"  "$APK_DIR/notekar-${VER}-armeabi-v7a.apk"
          mv "$APK_DIR/app-x86_64-release.apk"       "$APK_DIR/notekar-${VER}-x86_64.apk"

          echo "вң… Renamed APKs:"
          ls -lh "$APK_DIR"/notekar-*.apk

      # в”Җв”Җ 8. Generate SHA256 checksums в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Generate SHA256 checksums
        run: |
          APK_DIR=build/app/outputs/flutter-apk
          VER=${{ steps.version.outputs.version }}

          cd "$APK_DIR"
          sha256sum notekar-${VER}-arm64-v8a.apk \
                    notekar-${VER}-armeabi-v7a.apk \
                    notekar-${VER}-universal.apk \
                    notekar-${VER}-x86_64.apk \
            > sha256.txt

          echo "вң… SHA256 checksums:"
          cat sha256.txt

      # в”Җв”Җ 9. Generate version.json manifest в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Generate version.json
        run: |
          APK_DIR=build/app/outputs/flutter-apk
          VER=${{ steps.version.outputs.version }}
          BUILD=${{ steps.version.outputs.build_number }}
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          APKS=()
          for ARCH in arm64-v8a armeabi-v7a universal x86_64; do
            FILE="notekar-${VER}-${ARCH}.apk"
            SHA=$(sha256sum "$APK_DIR/$FILE" | awk '{print $1}')
            BYTES=$(stat -c%s "$APK_DIR/$FILE")
            APKS+=("{\"file\":\"$FILE\",\"sha256\":\"$SHA\",\"bytes\":$BYTES}")
          done

          APKS_JSON=$(printf '%s,' "${APKS[@]}" | sed 's/,$//')

          printf '{\n  "version": "%s",\n  "buildNumber": %s,\n  "generatedAt": "%s",\n  "apks": [%s]\n}\n' \
            "$VER" "$BUILD" "$NOW" "$APKS_JSON" > "$APK_DIR/version.json"

          echo "вң… version.json:"
          cat "$APK_DIR/version.json"

      # в”Җв”Җ 10. Upload all artifacts в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Upload APKs + checksums as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: notekar-${{ steps.version.outputs.version }}-${{ github.ref_name }}
          path: |
            build/app/outputs/flutter-apk/notekar-*.apk
            build/app/outputs/flutter-apk/sha256.txt
            build/app/outputs/flutter-apk/version.json
          retention-days: 90

      # в”Җв”Җ 11. Prepare release notes body в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Prepare release notes
        env:
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        run: |
          VER=${{ steps.version.outputs.version }}
          NOTES_FILE="releases/v${VER}/RELEASE_NOTES.md"
          APK_DIR="build/app/outputs/flutter-apk"

          if [ -f "$NOTES_FILE" ]; then
            echo "вң… Using $NOTES_FILE as release body"
            cp "$NOTES_FILE" /tmp/release_notes.md
          else
            echo "вҡ пёҸ  $NOTES_FILE not found вҖ” using fallback template"
            printf '## рҹ“Ұ Notekar %%s\n\nSigned release вҖ” built automatically from the `%s` branch.\n' "${{ steps.version.outputs.tag }}" "${{ github.ref_name }}" > /tmp/release_notes.md
          fi

          # Calculate universal APK hash and dynamic VirusTotal URL
          UNIVERSAL_APK="$APK_DIR/notekar-${VER}-universal.apk"
          UNIVERSAL_SHA=$(sha256sum "$UNIVERSAL_APK" | awk '{print $1}')
          VT_URL="https://www.virustotal.com/gui/file/${UNIVERSAL_SHA}"

          # Initialize default/fallback virustotal values
          MALICIOUS=0
          UNDETECTED=60
          TOTAL=60
          SCAN_DATE=$(date +%s)
          VT_JSON='{"url":"'"$VT_URL"'","malicious":0,"undetected":60,"total":60,"scanDate":'$SCAN_DATE'}'

          if [ -n "$VIRUSTOTAL_API_KEY" ]; then
            echo "рҹӣЎпёҸ Uploading $UNIVERSAL_APK to VirusTotal..."
            VT_RESPONSE=$(curl --request POST \
              --url https://www.virustotal.com/api/v3/files \
              --header "x-apikey: $VIRUSTOTAL_API_KEY" \
              --form "file=@$UNIVERSAL_APK" \
              --write-out "%%{http_code}" \
              --silent --output /tmp/vt_upload.json)
            
            if [ "$VT_RESPONSE" -eq 200 ]; then
              echo "вң… Successfully uploaded to VirusTotal."
              
              # Poll for report stats (up to 120 seconds)
              echo "рҹ”Қ Waiting for VirusTotal report to compile..."
              for i in {1..12}; do
                sleep 10
                VT_REPORT=$(curl --request GET \
                  --url "https://www.virustotal.com/api/v3/files/${UNIVERSAL_SHA}" \
                  --header "x-apikey: $VIRUSTOTAL_API_KEY" \
                  --silent)
                
                STATS=$(echo "$VT_REPORT" | jq -r '.data.attributes.last_analysis_stats // empty')
                if [ -n "$STATS" ]; then
                  MALICIOUS_COUNT=$(echo "$VT_REPORT" | jq -r '.data.attributes.last_analysis_stats.malicious // 0')
                  UNDETECTED_COUNT=$(echo "$VT_REPORT" | jq -r '.data.attributes.last_analysis_stats.undetected // 0')
                  HARMLESS_COUNT=$(echo "$VT_REPORT" | jq -r '.data.attributes.last_analysis_stats.harmless // 0')
                  SUSPICIOUS_COUNT=$(echo "$VT_REPORT" | jq -r '.data.attributes.last_analysis_stats.suspicious // 0')
                  TOTAL_COUNT=$((MALICIOUS_COUNT + UNDETECTED_COUNT + HARMLESS_COUNT + SUSPICIOUS_COUNT))
                  SCAN_DATE_VAL=$(echo "$VT_REPORT" | jq -r '.data.attributes.last_analysis_date // 0')
                  
                  if [ "$TOTAL_COUNT" -gt 0 ]; then
                    MALICIOUS=$MALICIOUS_COUNT
                    UNDETECTED=$UNDETECTED_COUNT
                    TOTAL=$TOTAL_COUNT
                    SCAN_DATE=$SCAN_DATE_VAL
                    echo "вң… VirusTotal scan completed: ${MALICIOUS}/${TOTAL} malicious."
                    VT_JSON='{"url":"'"$VT_URL"'","malicious":'$MALICIOUS',"undetected":'$UNDETECTED',"total":'$TOTAL',"scanDate":'$SCAN_DATE'}'
                    break
                  fi
                fi
              done
            else
              echo "вқҢ VirusTotal upload failed (HTTP $VT_RESPONSE). Response:"
              cat /tmp/vt_upload.json
            fi
          else
            echo "вҡ пёҸ VIRUSTOTAL_API_KEY secret is not configured вҖ” skipping upload"
          fi

          # Determine the channel and type based on the branch name
          if [ "${{ github.ref_name }}" = "beta" ]; then
            CHANNEL="beta"
            UPDATE_TYPE="Beta Update"
          elif [ "${{ github.ref_name }}" = "security" ]; then
            CHANNEL="security"
            UPDATE_TYPE="Security Update"
          else
            CHANNEL="stable"
            UPDATE_TYPE="Feature Update"
          fi

          # Update version.json with virustotal object, channel, and updateType using jq
          jq --argjson vt "$VT_JSON" --arg ch "$CHANNEL" --arg ty "$UPDATE_TYPE" '. + {virustotal: $vt, channel: $ch, updateType: $ty}' "$APK_DIR/version.json" > "$APK_DIR/version.tmp" && mv "$APK_DIR/version.tmp" "$APK_DIR/version.json"
          echo "вң… version.json updated with metadata and VirusTotal details:"
          cat "$APK_DIR/version.json"

          # Prepend Security Update header if pushing on security branch
          if [ "${{ github.ref_name }}" = "security" ]; then
            if ! grep -q "Security Update" /tmp/release_notes.md; then
              printf "## рҹӣЎпёҸ Security Update\n\n" | cat - /tmp/release_notes.md > /tmp/release_notes.tmp && mv /tmp/release_notes.tmp /tmp/release_notes.md
            fi
          fi

          # Format the last scan date
          SCAN_DATE_STR=$(date -d "@$SCAN_DATE" +"%%B %%d, %%Y" 2>/dev/null || date -r "$SCAN_DATE" +"%%B %%d, %%Y")

          if [ "$MALICIOUS" -eq 0 ]; then
            VT_STATUS="Undetected by 60+ engines"
          else
            VT_STATUS="Detected by ${MALICIOUS} / ${TOTAL} engines"
          fi

          # Construct the new Security block
          export SECURITY_BLOCK=$(printf "## Security\n\nрҹӣЎпёҸ **VirusTotal Status**: \`%s\`  \nрҹ”— [View Full Report](%s)  \nрҹ“… Last scanned: %s" "$VT_STATUS" "$VT_URL" "$SCAN_DATE_STR")

          # Replace the Security block in /tmp/release_notes.md
          perl -0777 -pi -e 's|(?m)^###? Security.*?(?=\n###? |\z)|$ENV{SECURITY_BLOCK}\n|g' /tmp/release_notes.md

          # Always append the APK install guide + verify block at the bottom
          printf "\n---\n\n### Assets\n\n| File | Use when |\n|------|----------|\n| \`notekar-VERSION-universal.apk\` | Not sure? Use this вҖ” works on all devices |\n| \`notekar-VERSION-arm64-v8a.apk\` | Most modern phones (recommended, smaller) |\n| \`notekar-VERSION-armeabi-v7a.apk\` | Older 32-bit phones |\n| \`notekar-VERSION-x86_64.apk\` | x86_64 emulators / devices |\n\n### Verifying\n\nDownload \`sha256.txt\` alongside any APK and run:\n\`\`\`bash\nsha256sum --check sha256.txt\n\`\`\`\n" >> /tmp/release_notes.md

          # Swap VERSION placeholder with actual version
          sed -i "s/VERSION/${VER}/g" /tmp/release_notes.md

          # Append dynamic SHA256 checksums of the actual artifacts
          echo "" >> /tmp/release_notes.md
          echo "### SHA256 Checksums" >> /tmp/release_notes.md
          echo "\`\`\`text" >> /tmp/release_notes.md
          cat "$APK_DIR/sha256.txt" >> /tmp/release_notes.md
          echo "\`\`\`" >> /tmp/release_notes.md

          # Append support options
          echo "" >> /tmp/release_notes.md
          echo "---" >> /tmp/release_notes.md
          echo "" >> /tmp/release_notes.md
          echo "## вҳ• Support the Project" >> /tmp/release_notes.md
          echo "" >> /tmp/release_notes.md
          echo "If you like NoteKar and want to support future updates:" >> /tmp/release_notes.md
          echo "" >> /tmp/release_notes.md
          echo "[![Buy Me a Coffee](https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png)](https://www.buymeacoffee.com/dheeraz)" >> /tmp/release_notes.md

          echo "рҹ“Ӣ Release notes preview:"
          cat /tmp/release_notes.md

      # в”Җв”Җ 12. Create GitHub Release with all files в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ github.ref_name == 'security' && format('Notekar {0} (Security Update)', steps.version.outputs.tag) || (github.ref_name == 'beta' && format('Notekar {0} (Beta)', steps.version.outputs.tag) || format('Notekar {0}', steps.version.outputs.tag)) }}
          make_latest: ${{ github.ref_name == 'release' || github.ref_name == 'security' }}
          prerelease: ${{ github.ref_name == 'beta' }}
          body_path: /tmp/release_notes.md
          files: |
            build/app/outputs/flutter-apk/notekar-*.apk
            build/app/outputs/flutter-apk/sha256.txt
            build/app/outputs/flutter-apk/version.json

      # в”Җв”Җ 13. Clean up keystore (security) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Remove keystore files
        if: always()
        run: |
          rm -f android/app/keystore.jks android/key.properties
          echo "рҹ”’ Keystore cleaned up"
